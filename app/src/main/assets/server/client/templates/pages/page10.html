<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 Cosmic Page 10 - Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Exo 2', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 25%, #000428 50%, #004e92 100%);
            min-height: 100vh;
            color: #e0e0ff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        
        /* Animated cosmic background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 30% 20%, rgba(120, 0, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 70% 80%, rgba(0, 255, 200, 0.1) 0%, transparent 40%);
            animation: cosmicPulse 15s ease-in-out infinite;
            z-index: -1;
        }
        
        @keyframes cosmicPulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }
        
        .page-number {
            text-align: center;
            font-size: 3em;
            font-weight: 900;
            margin: 50px 0;
            font-family: 'Orbitron', monospace;
            background: linear-gradient(45deg, #00ff88, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 50px rgba(0, 255, 200, 0.8);
            animation: textGlow 3s ease-in-out infinite;
        }
        
        @keyframes textGlow {
            0%, 100% { text-shadow: 0 0 50px rgba(0, 255, 200, 0.8); }
            50% { text-shadow: 0 0 80px rgba(0, 255, 200, 1); }
        }
        
        .content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        
        .cosmic-card {
            background: rgba(10, 10, 30, 0.8);
            backdrop-filter: blur(25px);
            border: 4px solid rgba(0, 255, 200, 0.4);
            border-radius: 35px;
            padding: 60px 40px;
            box-shadow: 0 0 100px rgba(0, 255, 200, 0.4);
            text-align: center;
            max-width: 600px;
            animation: cardFloat 8s ease-in-out infinite;
        }
        
        @keyframes cardFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-25px); }
        }
        
        .cosmic-card h2 {
            font-family: 'Orbitron', monospace;
            font-size: 2.5em;
            color: #00ff88;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(0, 255, 200, 0.7);
        }
        
        .cosmic-card p {
            font-size: 1.2em;
            line-height: 1.7;
            color: #e0e0ff;
        }
        
        .navbar {
            text-align: center;
            padding: 20px;
            background: rgba(10, 10, 30, 0.8);
            backdrop-filter: blur(15px);
            border-top: 3px solid rgba(0, 255, 200, 0.4);
            position: relative;
            z-index: 10;
        }
        
        .navbar a {
            margin: 0 20px;
            text-decoration: none;
            color: #00ff88;
            font-weight: 700;
            font-size: 1.1em;
            transition: all 0.3s ease;
            text-shadow: 0 0 15px rgba(0, 255, 200, 0.4);
            position: relative;
        }
        
        .navbar a::before {
            content: '☆';
            position: absolute;
            left: -25px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .navbar a::after {
            content: '☆';
            position: absolute;
            right: -25px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .navbar a:hover {
            color: #00ffff;
            text-shadow: 0 0 25px rgba(0, 255, 255, 0.8);
            transform: scale(1.2);
        }
        
        .navbar a:hover::before,
        .navbar a:hover::after {
            opacity: 1;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .page-number {
                font-size: 2em;
            }
            
            .cosmic-card {
                padding: 40px 20px;
            }
            
            .cosmic-card h2 {
                font-size: 1.8em;
            }
            
            .navbar a {
                margin: 0 10px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="page-number">🌟 Page 10 🌟</div>
    
    <div class="content">
        <div class="cosmic-card">
            <h2>⭐ CELESTIAL WISDOM</h2>
            <p>This sacred page is currently undergoing celestial alignment. The cosmic energies are being calibrated to bring you extraordinary astrological insights. Please return when the stars have aligned.</p>
            <p style="margin-top: 30px; font-size: 1.5em;">✨ Coming Soon ✨</p>
        </div>
    </div>
    
    <div class="navbar">
        {% for i in range(1, 16) %}
            <a href="/page{{i}}">{{i}}</a>
        {% endfor %}
    </div>
</body>
</html>
