        * {

        }
        
        body {

        /* Animated cosmic background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:

            z-index: -1;

        @keyframes cosmicPulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        
        /* Page Number */
        .page-number {
            text-align: center;

            font-weight: 900;
            margin-bottom: 30px;
            font-family: 'Orbitron', monospace;
            background: linear-gradient(45deg, #00ff88, #00ffff, #ff00ff);

            background-clip: text;
            text-shadow: 0 0 40px rgba(0, 255, 200, 0.6);
        }
        
        /* Form Container */
        .form-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 40px;

            border: 3px solid rgba(0, 255, 200, 0.4);

            50% { transform: translateY(-15px); }
        }
        
        h2 {
            font-family: 'Orbitron', monospace;
            font-size: 2.2em;
            text-align: center;
            margin-bottom: 30px;
            color: #00ff88;
            text-shadow: 0 0 30px rgba(0, 255, 200, 0.7);
            letter-spacing: 2px;
        }
        
        /* Form Elements */
        label {
            display: block;
            margin: 20px 0 10px 0;
            font-size: 1.1em;
            font-weight: 600;
            color: #00ffff;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.4);

        select {

            border: 2px solid rgba(0, 255, 200, 0.4);
            border-radius: 15px;
            transition: all 0.3s ease;
            outline: none;
            cursor: pointer;
        }
        
        select:focus {
            border-color: #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.6);
            transform: translateY(-3px);
        }
        
        select option {
            background: #1a0020;
            color: #e0e0ff;
        }
        
        /* Advanced Section */
        .advanced-button {
            width: 100%;
            padding: 18px;
            margin: 25px 0;
            background: linear-gradient(45deg, rgba(0, 255, 200, 0.3), rgba(120, 0, 255, 0.3));
            border: 3px solid rgba(0, 255, 200, 0.5);
            border-radius: 20px;
            color: #00ff88;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.1em;
        }
        
        .advanced-button:hover {
            background: linear-gradient(45deg, rgba(0, 255, 200, 0.5), rgba(120, 0, 255, 0.5));
            box-shadow: 0 0 40px rgba(0, 255, 200, 0.7);
            transform: translateY(-5px);
        }
        
        .dropdown-container {
            display: none;
            animation: slideDown 0.6s ease;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            border: 2px solid rgba(0, 255, 200, 0.2);
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Submit Button */
        button[type="submit"] {
            width: 100%;
            padding: 20px;
            margin-top: 30px;
            background: linear-gradient(45deg, #00ff88, #00ffff, #00ff88);
            background-size: 300% 300%;
            border: none;
            border-radius: 25px;
            font-size: 1.3em;
            font-weight: 700;
            color: #0a0a0a;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: gradientShift 4s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        button[type="submit"]:hover {
            transform: translateY(-8px);

            backdrop-filter: blur(15px);

                padding: 25px;
            }
