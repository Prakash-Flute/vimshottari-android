<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Cosmic Portal - Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Exo 2', sans-serif;
            background: radial-gradient(ellipse at center, #1a0033 0%, #000428 50%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        
        /* Animated galaxy background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 30% 40%, rgba(255, 0, 150, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 70% 60%, rgba(0, 255, 200, 0.1) 0%, transparent 40%);
            animation: galaxySpin 30s linear infinite;
            z-index: -1;
        }
        
        @keyframes galaxySpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Stars */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: starTwinkle var(--duration) var(--delay) infinite;
        }
        
        @keyframes starTwinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.5); }
        }
        
        /* Login Container */
        .login-box {
            background: rgba(10, 10, 30, 0.8);
            backdrop-filter: blur(25px);
            border: 3px solid rgba(0, 255, 200, 0.5);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 0 100px rgba(0, 255, 200, 0.4),
                        inset 0 0 50px rgba(120, 0, 255, 0.2);
            width: 90%;
            max-width: 450px;
            text-align: center;
            animation: containerFloat 8s ease-in-out infinite;
        }
        
        @keyframes containerFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        
        /* Title */
        h2 {
            font-family: 'Orbitron', monospace;
            font-size: 2.5em;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00ff88, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(0, 255, 200, 0.6);
            letter-spacing: 2px;
        }
        
        .subtitle {
            color: #00ff88;
            font-size: 1.1em;
            margin-bottom: 40px;
            text-shadow: 0 0 15px rgba(0, 255, 200, 0.5);
        }
        
        /* Form Fields */
        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            color: #00ff88;
            font-weight: 600;
            font-size: 1em;
            text-shadow: 0 0 10px rgba(0, 255, 200, 0.4);
        }
        
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(0, 255, 200, 0.4);
            border-radius: 15px;
            color: #e0e0ff;
            font-size: 1em;
            transition: all 0.3s ease;
            outline: none;
        }
        
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #00ffff;
            box-shadow: 0 0 25px rgba(0, 255, 200, 0.6);
            transform: translateY(-3px);
        }
        
        /* Login Button */
        button[type="submit"] {
            width: 100%;
            padding: 18px;
            margin-top: 20px;
            background: linear-gradient(45deg, #00ff88, #00ffff);
            border: none;
            border-radius: 20px;
            font-size: 1.2em;
            font-weight: 700;
            color: #0a0a0a;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
        }
        
        button[type="submit"]::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
            transition: 0.6s;
        }
        
        button[type="submit"]:hover::before {
            left: 100%;
        }
        
        button[type="submit"]:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 255, 200, 0.7);
        }
        
        /* Error Message */
        .error {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 0, 100, 0.2);
            border: 2px solid rgba(255, 0, 100, 0.5);
            border-radius: 15px;
            color: #ff0064;
            font-weight: 600;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .login-box {
                padding: 40px 25px;
            }
            
            h2 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="login-box">
        <h2>🔐 Cosmic Portal</h2>
        <p class="subtitle">Access the Mystical Realms</p>
        
        <form method="POST">
            <div class="input-group">
                <label for="username">👤 Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="input-group">
                <label for="password">🔑 Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit">🌟 Enter Portal</button>
        </form>
        
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
    </div>
    
    <script>
        // Generate stars
        const starsContainer = document.getElementById('stars');
        const starCount = 150;
        
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 3 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            star.style.setProperty('--delay', Math.random() * 5 + 's');
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
