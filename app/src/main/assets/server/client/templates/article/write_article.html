<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Cosmic Article Writer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Exo 2', sans-serif;
            background: linear-gradient(135deg, #000428 0%, #1a0033 25%, #0a0a0a 75%, #004e92 100%);
            min-height: 100vh;
            color: #e0e0ff;
            overflow-x: hidden;
            padding: 40px 20px;
        }
        
        /* Animated cosmic background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(255, 0, 150, 0.1) 0%, transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(0, 255, 200, 0.1) 0%, transparent 30%),
                radial-gradient(circle at 50% 50%, rgba(120, 0, 255, 0.05) 0%, transparent 40%);
            animation: cosmicShift 25s ease-in-out infinite;
            z-index: -1;
        }
        
        @keyframes cosmicShift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(-20px, -20px) scale(1.05); }
            50% { transform: translate(20px, -30px) scale(0.95); }
            75% { transform: translate(-30px, 20px) scale(1.02); }
        }
        
        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            background: linear-gradient(45deg, #00ff88, #00ffff);
            border-radius: 50%;
            animation: floatParticle var(--duration) var(--delay) infinite ease-in-out;
        }
        
        @keyframes floatParticle {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-100px) rotate(180deg); opacity: 0.8; }
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px;
            background: rgba(10, 10, 30, 0.7);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(0, 255, 200, 0.4);
            border-radius: 30px;
            box-shadow: 0 0 80px rgba(0, 255, 200, 0.3),
                        inset 0 0 40px rgba(120, 0, 255, 0.2);
            position: relative;
        }
        
        h2 {
            font-family: 'Orbitron', monospace;
            font-size: 2.8em;
            font-weight: 900;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #00ff88, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 50px rgba(0, 255, 200, 0.6);
            letter-spacing: 3px;
        }
        
        /* Summary Cards */
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .summary-item {
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 200, 0.3);
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .summary-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 200, 0.4);
        }
        
        .summary-label {
            font-size: 0.9em;
            color: #00ff88;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .summary-value {
            font-size: 1.3em;
            font-weight: 600;
            color: #ffffff;
            font-family: 'Orbitron', monospace;
        }
        
        /* Textarea */
        textarea {
            width: 100%;
            min-height: 500px;
            padding: 25px;
            font-size: 1.1em;
            background: rgba(0, 0, 0, 0.7);
            color: #e0e0ff;
            border: 2px solid rgba(0, 255, 200, 0.3);
            border-radius: 20px;
            resize: vertical;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Exo 2', sans-serif;
            line-height: 1.7;
        }
        
        textarea:focus {
            border-color: #00ffff;
            box-shadow: 0 0 40px rgba(0, 255, 200, 0.5);
        }
        
        textarea::placeholder {
            color: rgba(224, 224, 255, 0.5);
        }
        
        /* Submit Button */
        button[type="submit"] {
            width: 100%;
            padding: 20px;
            margin-top: 30px;
            background: linear-gradient(45deg, #00ff88, #00ffff, #ff00ff);
            background-size: 300% 300%;
            border: none;
            border-radius: 20px;
            font-size: 1.4em;
            font-weight: 700;
            color: #0a0a0a;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
            animation: gradientShift 3s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        button[type="submit"]::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
            transition: 0.6s;
        }
        
        button[type="submit"]:hover::before {
            left: 100%;
        }
        
        button[type="submit"]:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0, 255, 200, 0.8);
        }
        
        /* Back Button */
        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            color: #e0e0ff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-5px);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.3);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }
            
            h2 {
                font-size: 2em;
            }
            
            textarea {
                min-height: 400px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <a href="/" class="back-btn">← Return to Portal</a>
        
        <h2>🌟 Cosmic Article Writer 🌟</h2>
        
        <div class="summary">
            <div class="summary-item">
                <div class="summary-label">🔮 Ascendant</div>
                <div class="summary-value">{{ ascendant }}</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">🏠 House</div>
                <div class="summary-value">{{ house }}</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">☿️ Planet</div>
                <div class="summary-value">{{ planet }}</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">👁️ Aspected By</div>
                <div class="summary-value">{{ aspected_by }}</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">📍 From House</div>
                <div class="summary-value">{{ aspected_from_house }}</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">⭐ Nakshatra</div>
                <div class="summary-value">{{ nakshatra }}</div>
            </div>
        </div>
        
        <form action="/save_article" method="POST">
            <input type="hidden" name="ascendant" value="{{ ascendant }}">
            <input type="hidden" name="house" value="{{ house }}">
            <input type="hidden" name="planet" value="{{ planet }}">
            <input type="hidden" name="aspectedBy" value="{{ aspected_by }}">
            <input type="hidden" name="aspectedFromHouse" value="{{ aspected_from_house }}">
            <input type="hidden" name="nakshatra" value="{{ nakshatra }}">
            
            <textarea name="article" placeholder="✨ Channel the cosmic wisdom here... Let your words flow like stardust across the universe. Write the astrological insights that will guide souls through their celestial journey..." required></textarea>
            
            <button type="submit">🚀 Save to Cosmic Archives</button>
        </form>
    </div>
    
    <script>
        // Generate floating particles
        const particlesContainer = document.getElementById('particles');
        const particleCount = 50;
        
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.width = Math.random() * 4 + 2 + 'px';
            particle.style.height = particle.style.width;
            particle.style.setProperty('--duration', (Math.random() * 10 + 10) + 's');
            particle.style.setProperty('--delay', Math.random() * 5 + 's');
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
